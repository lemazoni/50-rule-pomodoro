<mat-card>
  <mat-card-header>
    <mat-card-title> Opções do Timer</mat-card-title>
  </mat-card-header>
  <mat-card-actions>
    <div class="flex flex-col">
      <mat-form-field>
        <mat-label>Tipo de Desenho</mat-label>
        <mat-select [formControl]="timerForm.controls.type">
          @for (option of timerTypes; track option){
            <mat-option [value]="option">{{option}}</mat-option>
          }
        </mat-select>
      </mat-form-field>

        <mat-label>Tipo de Desenho</mat-label>

          }
        </mat-select>
      </mat-form-field>
    </div>
  </mat-card-actions>
</mat-card>
